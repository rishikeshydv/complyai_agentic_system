version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: laws_v2_postgres
    environment:
      POSTGRES_DB: comply_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - laws_v2_pgdata:/var/lib/postgresql/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    container_name: laws_v2_es
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - laws_v2_esdata:/usr/share/elasticsearch/data

volumes:
  laws_v2_pgdata:
  laws_v2_esdata:
